name: Deploy to Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Gate: Only allow from release/* branches
  # ─────────────────────────────────────────────
  validate-branch:
    name: Validate Release Branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"
          if [[ ! "$BRANCH" =~ ^release/ ]]; then
            echo "::error::Production deployments are only allowed from release/* branches. Current branch: $BRANCH"
            exit 1
          fi
          echo "Branch validation passed: $BRANCH"

  # ─────────────────────────────────────────────
  # Pre-deploy checks
  # ─────────────────────────────────────────────
  pre-deploy-checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    needs: validate-branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: packages/db
        run: npx prisma generate

      - name: TypeScript type check
        working-directory: apps/web
        run: npx tsc --noEmit 2>&1 || echo "::warning::Type check issues detected"

      - name: Build verification
        run: npx turbo run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

  # ─────────────────────────────────────────────
  # Deploy to production (requires manual approval)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: packages/db
        run: npx prisma generate

      - name: Run Prisma migrations on production DB
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: npx prisma migrate deploy

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to production: $DEPLOY_URL"

      - name: Post-deploy smoke test
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          echo "Smoke testing production: $DEPLOY_URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "308" ]; then
              echo "Production smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "::error::Production smoke test failed after 5 attempts"
          exit 1

      - name: Tag release
        run: |
          VERSION="v$(date +%Y.%m.%d)-$(echo $GITHUB_SHA | cut -c1-7)"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Tagged release: $VERSION"

      - name: Post deployment summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Production URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Migrations** | Applied |" >> $GITHUB_STEP_SUMMARY
          echo "| **Git Tag** | v$(date +%Y.%m.%d)-$(echo $GITHUB_SHA | cut -c1-7) |" >> $GITHUB_STEP_SUMMARY
